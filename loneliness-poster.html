<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solitary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0D0D0F;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .poster {
            width: 540px;
            height: 810px;
            background: #0D0D0F;
            position: relative;
            overflow: hidden;
        }

        /* Single circle - the self */
        .circle-main {
            position: absolute;
            width: 240px;
            height: 240px;
            border: 1px solid #888890;
            border-radius: 50%;
            top: 200px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.7;
        }

        /* Inner circle */
        .circle-inner {
            position: absolute;
            width: 120px;
            height: 120px;
            background: #2A2A30;
            border-radius: 50%;
            top: 260px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.8;
        }

        /* Vertical line - isolation */
        .line-vertical {
            position: absolute;
            width: 1px;
            height: 80px;
            background: #909098;
            top: 480px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.5;
        }

        /* Horizontal line - absence */
        .line-horizontal {
            position: absolute;
            width: 60px;
            height: 1px;
            background: #909098;
            top: 520px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.4;
        }

        /* Small dot - presence */
        .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #B0B0B8;
            border-radius: 50%;
            top: 560px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.6;
        }

        /* Typography - minimal whisper */
        .word {
            position: absolute;
            font-size: 11px;
            font-weight: 300;
            color: #A0A0A8;
            letter-spacing: 0.5em;
            top: 600px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        /* Top margin - breathing room */
        .margin-top {
            position: absolute;
            width: 80px;
            height: 1px;
            background: #606068;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.5;
        }

        /* Subtle texture */
        .texture {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.015;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="texture"></div>
        <div class="margin-top"></div>
        <div class="circle-main"></div>
        <div class="circle-inner"></div>
        <div class="line-vertical"></div>
        <div class="line-horizontal"></div>
        <div class="dot"></div>
        <div class="word">孤独</div>
    </div>
</body>
</html>
