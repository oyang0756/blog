<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6.1 Children's Day</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500&display=swap');

        @font-face {
            font-family: 'Jura';
            src: url('https://fonts.gstatic.com/s/jura/v17/z0g8LD05JDOiBxC7.woff2') format('woff2');
            font-weight: 300;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #F5F2EB;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Outfit', sans-serif;
        }

        .poster {
            width: 540px;
            height: 810px;
            background: #F5F2EB;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.08);
        }

        /* Geometric composition */
        .circle-primary {
            position: absolute;
            width: 320px;
            height: 320px;
            background: #E53935;
            border-radius: 50%;
            top: -80px;
            right: -80px;
            opacity: 0.92;
        }

        .circle-secondary {
            position: absolute;
            width: 180px;
            height: 180px;
            background: #1565C0;
            border-radius: 50%;
            bottom: 140px;
            left: -60px;
            opacity: 0.88;
        }

        .circle-accent {
            position: absolute;
            width: 90px;
            height: 90px;
            background: #FDD835;
            border-radius: 50%;
            bottom: 280px;
            right: 60px;
            opacity: 0.95;
        }

        .rectangle-blue {
            position: absolute;
            width: 40px;
            height: 200px;
            background: #1565C0;
            top: 180px;
            left: 40px;
            opacity: 0.85;
        }

        .rectangle-yellow {
            position: absolute;
            width: 120px;
            height: 40px;
            background: #FDD835;
            top: 320px;
            left: 40px;
            opacity: 0.9;
        }

        .rectangle-red {
            position: absolute;
            width: 8px;
            height: 160px;
            background: #E53935;
            bottom: 120px;
            right: 140px;
            opacity: 0.85;
        }

        /* Grid pattern overlay */
        .grid-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            background-image:
                linear-gradient(#1565C0 1px, transparent 1px),
                linear-gradient(90deg, #1565C0 1px, transparent 1px);
            background-size: 18px 18px;
        }

        /* Typography */
        .main-title {
            position: absolute;
            font-size: 32px;
            font-weight: 500;
            color: #1565C0;
            letter-spacing: 0.15em;
            bottom: 80px;
            right: 50px;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        .date {
            position: absolute;
            font-size: 80px;
            font-weight: 500;
            color: #E53935;
            top: 40px;
            left: 50px;
            line-height: 1;
            opacity: 0.95;
            font-family: 'Outfit', sans-serif;
            letter-spacing: -0.02em;
        }

        .date span {
            font-size: 36px;
            vertical-align: middle;
            margin-left: 4px;
            font-weight: 300;
            position: relative;
            top: -8px;
        }

        .subtitle {
            position: absolute;
            font-size: 16px;
            font-weight: 500;
            color: #333;
            letter-spacing: 0.4em;
            top: 120px;
            left: 52px;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        .bottom-text {
            position: absolute;
            font-size: 12px;
            font-weight: 300;
            color: #888;
            letter-spacing: 0.25em;
            bottom: 50px;
            right: 50px;
            text-align: right;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        /* Decorative dots */
        .dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #E53935;
            border-radius: 50%;
        }

        .dot-1 { bottom: 240px; left: 180px; }
        .dot-2 { bottom: 240px; left: 200px; }
        .dot-3 { bottom: 240px; left: 220px; }
        .dot-4 { bottom: 240px; left: 240px; }

        /* Small geometric accents */
        .triangle {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 20px solid #1565C0;
            opacity: 0.7;
        }

        .triangle-1 {
            bottom: 100px;
            left: 50px;
            transform: rotate(180deg);
        }

        .triangle-2 {
            bottom: 80px;
            left: 66px;
            transform: rotate(180deg);
            opacity: 0.4;
        }

        /* Horizontal line accent */
        .line-accent {
            position: absolute;
            height: 2px;
            background: #333;
            opacity: 0.15;
        }

        .line-1 {
            width: 100px;
            bottom: 160px;
            left: 50px;
        }

        .line-2 {
            width: 60px;
            bottom: 60px;
            left: 50px;
        }
    </style>
</head>
<body>
    <div class="poster">
        <!-- Background grid -->
        <div class="grid-lines"></div>

        <!-- Primary geometric shapes -->
        <div class="circle-primary"></div>
        <div class="circle-secondary"></div>
        <div class="circle-accent"></div>

        <div class="rectangle-blue"></div>
        <div class="rectangle-yellow"></div>
        <div class="rectangle-red"></div>

        <!-- Typography -->
        <div class="date">6<span>.</span>1</div>
        <div class="subtitle">国际儿童节</div>
        <div class="main-title">快乐与梦想</div>

        <!-- Decorative elements -->
        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>
        <div class="dot dot-3"></div>
        <div class="dot dot-4"></div>

        <div class="triangle triangle-1"></div>
        <div class="triangle triangle-2"></div>

        <div class="line-accent line-1"></div>
        <div class="line-accent line-2"></div>

        <div class="bottom-text">庆祝每一个童真的心灵</div>
    </div>
</body>
</html>
